default: &default
  adapter: postgresql
  encoding: unicode
  username: lalo
  password: password123
  host: localhost
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  database: certificaciones_facpya_development

test:
  <<: *default
  database: certificaciones_facpya_test

production:
  <<: *default
  adapter: postgresql
  encoding: unicode
  url: <%= ENV.fetch("DATABASE_URL", "") %>